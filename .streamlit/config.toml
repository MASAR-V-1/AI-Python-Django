[theme]
# لون الأزرار وعناصر التفاعل النشطة (الأزرق من الشعار)
primaryColor = "#2563eb"

# لون الخلفية الأساسية للتطبيق
backgroundColor = "#ffffff"

# لون الألواح الجانبية أو الصناديق الخلفية (درجة رمادي ناعمة جداً تبرز الألوان)
secondaryBackgroundColor = "#f8fafc"

# لون النصوص للقراءة المريحة
textColor = "#0f172a"

# نوع الخط
font = "sans serif"